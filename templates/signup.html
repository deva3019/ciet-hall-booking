<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign Up • CIET Hall Booking</title>
  <link rel="icon" href="/static/images/college_logo.png" />

  <!-- Tailwind CDN -->
  <script src="https://unpkg.com/tailwindcss-cdn@3.4.1/tailwindcss.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <!-- AOS + SweetAlert2 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Pre-paint theme -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', saved ? saved === 'dark' : prefersDark);
      } catch(e) {}
    })();
  </script>

  <style>
    .blob { filter: blur(60px); opacity:.28 }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-20px) rotate(5deg)} }
    @media (prefers-reduced-motion: reduce) { .blob { animation: none !important } }
  </style>
</head>

<body class="min-h-screen bg-white text-slate-900 dark:bg-slate-950 dark:text-white">
  <!-- Animated background -->
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute -top-32 -left-32 w-[500px] h-[500px] rounded-full bg-indigo-500/40 dark:bg-indigo-500/35 blob" style="animation: float 18s ease-in-out infinite;"></div>
    <div class="absolute -bottom-32 -right-32 w-[600px] h-[600px] rounded-full bg-fuchsia-500/30 dark:bg-fuchsia-500/25 blob" style="animation: float 22s ease-in-out infinite 2s;"></div>
  </div>

  <!-- Header -->
  <header class="max-w-lg mx-auto px-6 py-8 flex items-center justify-between" data-aos="fade-down">
    <a href="index.html" class="flex items-center gap-3">
      <img src="/static/images/college_logo.png" alt="CIET" class="w-11 h-11" />
      <div class="leading-tight">
        <p class="font-semibold text-slate-800 dark:text-slate-200">CIET</p>
        <p class="text-xs text-slate-600 dark:text-slate-400">Hall Booking</p>
      </div>
    </a>
    <button id="themeToggle" aria-label="Toggle theme"
            class="px-3 py-2 rounded-lg border border-slate-300/60 dark:border-white/20 hover:bg-slate-100 dark:hover:bg-white/10 transition">
      <span id="themeIcon">🌙</span>
    </button>
  </header>

  <!-- Signup Card -->
  <main class="grid place-items-center px-4 py-4">
    <section class="w-full max-w-md p-8 rounded-3xl border border-slate-300/60 dark:border-white/10 bg-white/80 dark:bg-white/5 backdrop-blur-xl shadow-2xl"
             data-aos="zoom-in" data-aos-duration="700">
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold">Create Account</h1>
        <p class="text-sm text-slate-600 dark:text-slate-300 mt-1">CIET Hall Booking System</p>
      </div>

      <!-- Security Warning -->
      <div class="p-3 rounded-lg bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 mb-6">
        <p class="text-xs text-amber-800 dark:text-amber-200">🔒 <strong>Important:</strong> Save your username! Admin resets passwords only.</p>
      </div>

      <form id="signupForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-2">Full Name</label>
          <input id="fullName" type="text" class="w-full px-4 py-2 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 focus:border-indigo-500 outline-none transition" placeholder="Your full name" />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Email</label>
          <input id="email" type="email" class="w-full px-4 py-2 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 focus:border-indigo-500 outline-none transition" placeholder="your@email.com" required />
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Username</label>
          <input id="username" type="text" class="w-full px-4 py-2 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 focus:border-indigo-500 outline-none transition" placeholder="username" required />
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">💡 Tip: Principal usernames start with "principal_"</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Role</label>
          <select id="role" class="w-full px-4 py-2 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 focus:border-indigo-500 outline-none transition" required>
            <option value="">Select Role</option>
            <option value="principal">Principal</option>
            <option value="staff">Staff/HOD</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Department</label>
          <select id="department" class="w-full px-4 py-2 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 focus:border-indigo-500 outline-none transition" required>
            <option value="">Select Department</option>
            <option value="CSE">CSE - Computer Science</option>
            <option value="ECE">ECE - Electronics & Communication</option>
            <option value="AIDS">AIDS - AI & Data Science</option>
            <option value="MCT">MCT - Mechanical</option>
            <option value="CIVIL">CIVIL - Civil Engineering</option>
            <option value="MECH">MECH - Mechanical Engineering</option>
            <option value="IT">IT - Information Technology</option>
            <option value="CYBER SECURITY">CYBER SECURITY - Cybersecurity</option>
            <option value="VLSI">VLSI - VLSI Design</option>
            <option value="EEE">EEE - Electrical & Electronics</option>
            <option value="AIML">AIML - AI & Machine Learning</option>
            <option value="S&H">S&H - Science & Humanity</option>
            <option value="Placement">Placement</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Password</label>
          <div class="relative">
            <input id="password" type="password" class="w-full px-4 py-2 pr-12 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 focus:border-indigo-500 outline-none transition" placeholder="Min 8 characters" required />
            <button type="button" class="togglePwd absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200">👁️</button>
          </div>
          <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">⚠️ Min 8 characters, use strong password</p>
        </div>

        <div>
          <label class="block text-sm font-medium mb-2">Confirm Password</label>
          <div class="relative">
            <input id="confirmPassword" type="password" class="w-full px-4 py-2 pr-12 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-white/10 focus:border-indigo-500 outline-none transition" placeholder="Confirm password" required />
            <button type="button" class="togglePwd absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200">👁️</button>
          </div>
        </div>

        <button type="submit" class="w-full px-4 py-3 rounded-lg bg-indigo-600 text-white font-semibold hover:bg-indigo-500 active:scale-[.98] transition mt-6">
          <span id="submitText">Create Account</span>
        </button>
      </form>

      <!-- Login Link -->
      <div class="mt-6 text-center">
        <p class="text-sm text-slate-600 dark:text-slate-300">Already have an account?</p>
        <a href="login.html" class="inline-block mt-2 px-4 py-2 rounded-lg border border-indigo-600 text-indigo-600 dark:text-indigo-400 dark:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition font-semibold text-sm">
          Sign In
        </a>
      </div>

      <div class="mt-6 text-center">
        <p class="text-xs text-slate-500 dark:text-slate-400">© CIET • Smart Hall Booking</p>
      </div>
    </section>
  </main>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.min.js"></script>

  <script>
    const apiBase = 'http://127.0.0.1:5000';

    if (typeof AOS !== 'undefined') {
      AOS.init({ once: true, duration: 700, easing: 'ease-out-cubic', offset: 50 });
    }

    // Theme Toggle
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    
    function setIcon() {
      themeIcon.textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';
    }
    
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
      setIcon();
    });
    
    setIcon();

    // Password Toggle
    document.querySelectorAll('.togglePwd').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const input = btn.parentElement.querySelector('input');
        const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
        input.setAttribute('type', type);
        btn.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
      });
    });

    // Signup
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const username = document.getElementById('username').value.trim();
      const role = document.getElementById('role').value;
      const department = document.getElementById('department').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!fullName || !email || !username || !role || !department || !password || !confirmPassword) {
        return Swal.fire({ icon: 'warning', title: 'Missing Fields', text: 'Fill all fields' });
      }

      if (password.length < 8) {
        return Swal.fire({ icon: 'warning', title: 'Weak Password', text: 'Password must be at least 8 characters' });
      }

      if (password !== confirmPassword) {
        return Swal.fire({ icon: 'warning', title: 'Password Mismatch', text: 'Passwords do not match' });
      }

      document.getElementById('submitText').textContent = 'Creating...';
      document.getElementById('signupForm').querySelector('button').disabled = true;

      try {
        const res = await fetch(`${apiBase}/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, email, username, role, department, full_name: fullName, password })
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById('submitText').textContent = 'Create Account';
          document.getElementById('signupForm').querySelector('button').disabled = false;
          return Swal.fire({ icon: 'error', title: 'Signup Failed', text: data.message || 'Try again' });
        }

        await Swal.fire({
          icon: 'success',
          title: 'Account Created! ✅',
          html: `
            <p>Your account has been created successfully.</p>
            <p style="margin-top: 10px; color: #ef4444; font-weight: bold;">⚠️ Save Your Username:</p>
            <p style="margin-top: 5px; background: #f3f4f6; padding: 8px; border-radius: 6px; font-family: monospace; font-weight: bold;">${username}</p>
            <p style="margin-top: 10px; font-size: 12px; color: #666;">Admin resets passwords only - don't forget it!</p>
          `,
          confirmButtonText: 'Go to Login',
          confirmButtonColor: '#4f46e5'
        });

        location.href = 'login.html';

      } catch (err) {
        console.error('❌ Error:', err);
        document.getElementById('submitText').textContent = 'Create Account';
        document.getElementById('signupForm').querySelector('button').disabled = false;
        Swal.fire({ icon: 'error', title: 'Network Error', text: 'Check your connection' });
      }
    });
  </script>
</body>
</html>
